<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="24" height="24">
  <!-- Mickey Mouse head -->
  <circle cx="50" cy="50" r="40" fill="#000000"/>
  <!-- Ears -->
  <circle cx="25" cy="25" r="15" fill="#000000"/>
  <circle cx="75" cy="25" r="15" fill="#000000"/>
  <!-- Eyes -->
  <circle cx="40" cy="45" r="5" fill="#FFFFFF"/>
  <circle cx="60" cy="45" r="5" fill="#FFFFFF"/>
  <!-- Pupils -->
  <circle cx="40" cy="45" r="2" fill="#000000"/>
  <circle cx="60" cy="45" r="2" fill="#000000"/>
  <!-- Nose -->
  <circle cx="50" cy="55" r="3" fill="#000000"/>
  <!-- Mouth -->
  <path d="M 35 65 Q 50 75 65 65" stroke="#000000" stroke-width="2" fill="none"/>
</svg>